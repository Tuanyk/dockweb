services:
  # --- NGINX (Gateway) ---
  nginx:
    image: nginx:alpine
    container_name: gateway_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./sites:/var/www/sites:ro
      - ./nginx/conf.d:/etc/nginx/conf.d
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
      - ./logs/nginx:/var/log/nginx
      - ./certbot/conf:/etc/letsencrypt:ro
      - ./certbot/www:/var/www/certbot:ro
      - ./nginx/cache:/var/cache/nginx
      - ./cloudflare-certs:/etc/nginx/cloudflare-certs:ro
      - ./nginx/cloudflare-ips.conf:/etc/nginx/cloudflare-ips.conf:ro
    depends_on:
      - mysql
    networks:
      - web_network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD-SHELL", "wget --quiet --tries=1 --spider http://localhost/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '1.0'
        reservations:
          memory: 128M
          cpus: '0.25'

  # --- PHP Containers (managed by dockweb in docker-compose.sites.yml) ---

  # --- Data Services ---
  mysql:
    image: mysql:8.4
    container_name: shared_mysql
    restart: unless-stopped
    command: >
      --innodb-buffer-pool-size=${MYSQL_INNODB_BUFFER_POOL_SIZE:-512M}
      --max-connections=150
      --bind-address=0.0.0.0
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-secret}
    volumes:
      - ./mysql/data:/var/lib/mysql
      - ./logs/mysql:/var/log/mysql
      - ./mysql/init:/docker-entrypoint-initdb.d
    networks:
      - web_network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_ROOT_PASSWORD:-secret}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '2.0'
        reservations:
          memory: 512M
          cpus: '0.5'

  redis:
    image: redis:alpine
    container_name: shared_redis
    restart: unless-stopped
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru --save 60 1000 --appendonly yes
    volumes:
      - redis-data:/data
    networks:
      - web_network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 384M
          cpus: '0.5'
        reservations:
          memory: 128M
          cpus: '0.1'

  # --- Management & Security ---
  
  # 1. Automated Backup (Restic)
  backup:
    build: ./backup
    container_name: backup_service
    restart: unless-stopped
    environment:
      DB_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-secret}
      RESTIC_PASSWORD: ${RESTIC_PASSWORD:-change_this_secure_password}
      ALERT_EMAIL: ${ALERT_EMAIL:-}
    volumes:
      - ./sites:/var/www/sites:ro             # Read-only access to source files
      - ./backups:/backups            # Destination for backup repo
    depends_on:
      - mysql
    networks:
      - web_network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '1.0'
        reservations:
          memory: 128M
          cpus: '0.1'

  # 2. Server Monitoring (Glances)
  monitor:
    image: nicolargo/glances:latest
    container_name: monitor_glances
    restart: unless-stopped
    pid: host                         # Needs host PID to monitor system processes
    environment:
      GLANCES_OPT: "-w"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro # Monitor Docker stats
    ports:
      - "127.0.0.1:61208:61208"       # Bind to localhost only (use SSH tunnel or reverse proxy)
    networks:
      - web_network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.5'
        reservations:
          memory: 64M
          cpus: '0.1'

  # 3. Fail2Ban
  fail2ban:
    image: crazymax/fail2ban:latest
    container_name: fail2ban
    network_mode: host
    cap_add:
      - NET_ADMIN
      - NET_RAW
    volumes:
      - ./fail2ban/jail.d:/data/jail.d
      - ./fail2ban/filter.d:/data/filter.d
      - ./logs/nginx:/var/log/nginx:ro
    restart: always
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: '0.5'
        reservations:
          memory: 32M
          cpus: '0.1'

  # 4. Logrotate
  logrotate:
    image: alpine:latest
    container_name: logrotate
    command: "/bin/sh -c 'apk add --no-cache logrotate && echo \"0 0 * * * /usr/sbin/logrotate /etc/logrotate.d/nginx\" >> /etc/crontabs/root && crond -f'"
    volumes:
      - ./logs/nginx:/var/log/nginx
      - ./logrotate/nginx:/etc/logrotate.d/nginx
    networks:
      - web_network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          memory: 64M
          cpus: '0.1'
        reservations:
          memory: 16M
          cpus: '0.05'

  # 5. SSL Certificate Management (Certbot)
  certbot:
    image: certbot/certbot
    container_name: certbot
    volumes:
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot
      - ./certbot/logs:/var/log/letsencrypt
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew --webroot -w /var/www/certbot --quiet; sleep 12h & wait $${!}; done;'"
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: '0.2'
        reservations:
          memory: 32M
          cpus: '0.05'

  # 6. Web Application Firewall (ModSecurity)
  modsecurity:
    build: ./modsecurity
    container_name: modsecurity_waf
    restart: unless-stopped
    ports:
      - "8080:80"
    environment:
      BACKEND: http://gateway_nginx:80
      PARANOIA: 1
      ANOMALY_INBOUND: 5
      ANOMALY_OUTBOUND: 4
    volumes:
      - ./logs/modsecurity:/var/log/modsecurity
    depends_on:
      - nginx
    networks:
      - web_network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '1.0'
        reservations:
          memory: 128M
          cpus: '0.25'

networks:
  web_network:
    driver: bridge

volumes:
  redis-data:
