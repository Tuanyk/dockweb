version: "3.8"

x-php-service: &php-template
  build: ./php
  restart: unless-stopped
  environment:
    PM_MAX_CHILDREN: ${PHP_PM_MAX_CHILDREN:-5}
  depends_on:
    - mysql
    - redis
  networks:
    - web_network

services:
  # --- NGINX (Shared Gateway) ---
  nginx:
    image: nginx:alpine
    container_name: gateway_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./sites:/var/www/sites:ro
      - ./nginx/conf.d:/etc/nginx/conf.d
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
      - ./logs/nginx:/var/log/nginx
    depends_on:
      - php_kairoxbuild
      - mysql
    networks:
      - web_network

  # --- PHP Containers ---
  
  # Site: kairoxbuild.com
  php_kairoxbuild:
    <<: *php-template
    container_name: php_kairoxbuild
    environment:
      PM_MAX_CHILDREN: ${PHP_PM_MAX_CHILDREN:-5}
      SITE_NAME: "kairoxbuild.com"
    volumes:
      - ./sites/kairoxbuild.com:/var/www/sites/kairoxbuild.com
      - ./logs/php/kairoxbuild.com:/var/log

  # Template for future sites (Uncomment and edit to add)
  # php_another_site:
  #   <<: *php-template
  #   container_name: php_another_site
  #   environment:
  #     PM_MAX_CHILDREN: ${PHP_PM_MAX_CHILDREN:-5}
  #     SITE_NAME: "another_site"
  #   volumes:
  #     - ./sites/another-site:/var/www/sites/another-site
  #     - ./logs/php/another-site:/var/log
  #   networks:
  #     - web_network

  # --- Shared Services ---
  mysql:
    image: mysql:8.0
    container_name: shared_mysql
    restart: unless-stopped
    command: >
      --innodb-buffer-pool-size=${MYSQL_INNODB_BUFFER_POOL_SIZE:-512M}
      --max-connections=500
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-secret}
    volumes:
      - ./mysql/data:/var/lib/mysql
      - ./logs/mysql:/var/log/mysql
    networks:
      - web_network

  redis:
    image: redis:alpine
    container_name: shared_redis
    restart: unless-stopped
    volumes:
      - redis-data:/data
    networks:
      - web_network

  # --- Security & Maintenance ---
  fail2ban:
    image: crazymax/fail2ban:latest
    container_name: fail2ban
    network_mode: host
    cap_add:
      - NET_ADMIN
      - NET_RAW
    volumes:
      - ./fail2ban/jail.d:/data/jail.d
      - ./fail2ban/filter.d:/data/filter.d
      - ./logs/nginx:/var/log/nginx:ro
    restart: always

  logrotate:
    image: alpine:latest
    container_name: logrotate
    command: "/bin/sh -c 'apk add --no-cache logrotate && echo \"*/15 * * * * /usr/sbin/logrotate /etc/logrotate.d/nginx\" >> /etc/crontabs/root && crond -f'"
    volumes:
      - ./logs/nginx:/var/log/nginx
      - ./logrotate/nginx:/etc/logrotate.d/nginx
    networks:
      - web_network

networks:
  web_network:
    driver: bridge

volumes:
  redis-data: