version: "3.8"

x-php-service: &php-template
  build: ./php
  restart: unless-stopped
  environment:
    PM_MAX_CHILDREN: ${PHP_PM_MAX_CHILDREN:-5}
  depends_on:
    - mysql
    - redis
  networks:
    - web_network

services:
  # --- NGINX (Gateway) ---
  nginx:
    image: nginx:alpine
    container_name: gateway_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./sites:/var/www/sites:ro
      - ./nginx/conf.d:/etc/nginx/conf.d
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
      - ./logs/nginx:/var/log/nginx
    depends_on:
      - php_kairoxbuild
      - mysql
    networks:
      - web_network

  # --- PHP Containers ---
  php_kairoxbuild:
    <<: *php-template
    container_name: php_kairoxbuild
    environment:
      PM_MAX_CHILDREN: ${PHP_PM_MAX_CHILDREN:-5}
      SITE_NAME: "kairoxbuild.com"
    volumes:
      - ./sites/kairoxbuild.com:/var/www/sites/kairoxbuild.com
      - ./logs/php/kairoxbuild.com:/var/log

  # --- Data Services ---
  mysql:
    image: mysql:8.0
    container_name: shared_mysql
    restart: unless-stopped
    command: >
      --innodb-buffer-pool-size=${MYSQL_INNODB_BUFFER_POOL_SIZE:-512M}
      --max-connections=500
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-secret}
    volumes:
      - ./mysql/data:/var/lib/mysql
      - ./logs/mysql:/var/log/mysql
    networks:
      - web_network

  redis:
    image: redis:alpine
    container_name: shared_redis
    restart: unless-stopped
    volumes:
      - redis-data:/data
    networks:
      - web_network

  # --- Management & Security ---
  
  # 1. Automated Backup (Restic)
  backup:
    build: ./backup
    container_name: backup_service
    restart: unless-stopped
    environment:
      DB_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-secret}
      RESTIC_PASSWORD: ${RESTIC_PASSWORD:-change_this_secure_password}
    volumes:
      - ./sites:/var/www/sites:ro             # Read-only access to source files
      - ./backups:/backups            # Destination for backup repo
    depends_on:
      - mysql
    networks:
      - web_network

  # 2. Server Monitoring (Glances)
  monitor:
    image: nicolargo/glances:latest-alpine
    container_name: monitor_glances
    restart: unless-stopped
    pid: host                         # Needs host PID to monitor system processes
    environment:
      GLANCES_OPT: "-w"               # Start in Web Server mode
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro # Monitor Docker stats
    ports:
      - "61208:61208"                 # Web UI port
    networks:
      - web_network

  # 3. Fail2Ban
  fail2ban:
    image: crazymax/fail2ban:latest
    container_name: fail2ban
    network_mode: host
    cap_add:
      - NET_ADMIN
      - NET_RAW
    volumes:
      - ./fail2ban/jail.d:/data/jail.d
      - ./fail2ban/filter.d:/data/filter.d
      - ./logs/nginx:/var/log/nginx:ro
    restart: always

  # 4. Logrotate
  logrotate:
    image: alpine:latest
    container_name: logrotate
    command: "/bin/sh -c 'apk add --no-cache logrotate && echo \"*/15 * * * * /usr/sbin/logrotate /etc/logrotate.d/nginx\" >> /etc/crontabs/root && crond -f'"
    volumes:
      - ./logs/nginx:/var/log/nginx
      - ./logrotate/nginx:/etc/logrotate.d/nginx
    networks:
      - web_network

networks:
  web_network:
    driver: bridge

volumes:
  redis-data:
