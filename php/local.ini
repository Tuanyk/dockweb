[PHP]
; Security
expose_php = Off
display_errors = Off
display_startup_errors = Off
log_errors = On

; Limits
memory_limit = 256M
upload_max_filesize = 64M
post_max_size = 64M
max_execution_time = 300

; Performance (Opcache)
opcache.enable=1
opcache.enable_cli=1
; Increase memory to 128MB or 256MB for production
opcache.memory_consumption=128
opcache.interned_strings_buffer=8
opcache.max_accelerated_files=10000
; Production setting: disable timestamp validation for maximum performance
; To deploy code changes, restart the PHP-FPM container
opcache.validate_timestamps=0
opcache.save_comments=1
opcache.fast_shutdown=1

; JIT Compiler (PHP 8+) - optional speed boost for CPU intensive tasks
opcache.jit_buffer_size=100M
opcache.jit=tracing

; Realpath cache for better performance
realpath_cache_size=4096K
realpath_cache_ttl=600
