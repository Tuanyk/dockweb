[PHP]
; Security
expose_php = Off
display_errors = Off
display_startup_errors = Off
log_errors = On

; Limits
memory_limit = 256M
upload_max_filesize = 64M
post_max_size = 64M
max_execution_time = 300

; Performance (Opcache)
opcache.enable=1
opcache.enable_cli=1
; Increase memory to 128MB or 256MB for production
opcache.memory_consumption=128
opcache.interned_strings_buffer=8
opcache.max_accelerated_files=10000
; WordPress-compatible: check for file changes every 60 seconds
; This allows plugin/theme updates from wp-admin to take effect automatically
; Set to 0 for non-WordPress sites to skip file checks (max performance)
opcache.validate_timestamps=1
opcache.revalidate_freq=60
opcache.save_comments=1
opcache.fast_shutdown=1

; JIT Compiler (PHP 8+) - optional speed boost for CPU intensive tasks
opcache.jit_buffer_size=100M
opcache.jit=tracing

; Realpath cache for better performance
realpath_cache_size=4096K
realpath_cache_ttl=600
